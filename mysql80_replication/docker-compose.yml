version: "2.4"
services:
  mysql_source:
    container_name: mysql_source
    image: mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: qlalfqjsgh486
      MYSQL_DATABASE: test
    volumes:
      - mysql_source:/var/lib/mysql
    ports:
      - "33071:3306"
    networks:
      - mysql_replication
    restart: unless-stopped

  mysql_replica:
    container_name: mysql_replica
    image: mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: qlalfqjsgh486
      MYSQL_DATABASE: test
    volumes:
      - mysql_replica:/var/lib/mysql
    ports:
      - "33072:3306"
    networks:
      - mysql_replication
    restart: unless-stopped

  

networks:
  mysql_replication:
    driver: bridge

volumes:
  mysql_source:
  mysql_replica: 
